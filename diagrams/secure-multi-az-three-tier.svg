<rect x="250" y="650" width="220" height="58" rx="10" fill="#f97316"/><text x="360" y="684" text-anchor="middle" fill="white" font-family="Arial" font-size="16">ECS / EKS / EC2 Service</text>
<rect x="520" y="650" width="210" height="58" rx="10" fill="#7c3aed"/><text x="625" y="684" text-anchor="middle" fill="white" font-family="Arial" font-size="16">ElastiCache Node</text>
<rect x="145" y="760" width="695" height="150" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/><text x="165" y="788" font-family="Arial" font-weight="700">Isolated Data Subnet A — 10.20.20.0/24</text>
