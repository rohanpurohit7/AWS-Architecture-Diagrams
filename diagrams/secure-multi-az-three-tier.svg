<rect x="205" y="492" width="235" height="52" rx="10" fill="#2563eb" filter="url(#shadow)"/><text x="323" y="524" text-anchor="middle" fill="white" font-family="Arial" font-size="16">Application Load Balancer</text>
<rect x="525" y="492" width="210" height="52" rx="10" fill="#f59e0b"/><text x="630" y="524" text-anchor="middle" fill="white" font-family="Arial" font-size="16">NAT Gateway A</text>
