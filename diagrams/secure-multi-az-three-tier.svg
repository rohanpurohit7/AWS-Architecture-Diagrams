<text x="108" y="337" font-family="Arial" font-size="20" font-weight="700" fill="#166534">Application VPC — 10.20.0.0/16</text>
<!-- IGW / endpoints -->
<rect x="745" y="318" width="220" height="42" rx="9" fill="#f59e0b"/><text x="855" y="344" text-anchor="middle" fill="white" font-family="Arial" font-size="16">Internet Gateway</text>
<rect x="1040" y="318" width="280" height="42" rx="9" fill="#0f766e"/><text x="1180" y="344" text-anchor="middle" fill="white" font-family="Arial" font-size="16">Interface / Gateway Endpoints</text>
