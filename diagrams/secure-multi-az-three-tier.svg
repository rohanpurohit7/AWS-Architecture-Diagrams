<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#475569"/></marker><filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity=".18"/></filter></defs>
<rect width="1800" height="1120" fill="#f8fafc"/>
<text x="55" y="55" font-family="Arial" font-size="36" font-weight="700" fill="#111827">Secure Multi-AZ Three-Tier AWS Architecture</text>
<text x="55" y="88" font-family="Arial" font-size="18" fill="#475569">Internet edge, public ingress, private compute, isolated data, VPC endpoints, security telemetry, and two Availability Zones</text>
<!-- edge -->
<rect x="55" y="120" width="1690" height="105" rx="16" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
<text x="75" y="147" font-family="Arial" font-size="18" font-weight="700">AWS Edge and Global Services</text>
<rect x="110" y="165" width="190" height="42" rx="10" fill="#8e44ad"/><text x="205" y="191" text-anchor="middle" fill="white" font-family="Arial" font-size="16">Route 53</text>
<rect x="340" y="165" width="190" height="42" rx="10" fill="#8e44ad"/><text x="435" y="191" text-anchor="middle" fill="white" font-family="Arial" font-size="16">CloudFront</text>
<rect x="570" y="165" width="190" height="42" rx="10" fill="#c0392b"/><text x="665" y="191" text-anchor="middle" fill="white" font-family="Arial" font-size="16">AWS WAF / Shield</text>
<line x1="300" y1="186" x2="335" y2="186" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/><line x1="530" y1="186" x2="565" y2="186" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
