<rect x="990" y="492" width="235" height="52" rx="10" fill="#2563eb" filter="url(#shadow)"/><text x="1108" y="524" text-anchor="middle" fill="white" font-family="Arial" font-size="16">ALB Node / ENI</text>
<rect x="1310" y="492" width="210" height="52" rx="10" fill="#f59e0b"/><text x="1415" y="524" text-anchor="middle" fill="white" font-family="Arial" font-size="16">NAT Gateway B</text>
<rect x="930" y="590" width="725" height="150" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="950" y="618" font-family="Arial" font-weight="700">Private Application Subnet B — 10.20.11.0/24</text>
<rect x="1050" y="650" width="220" height="58" rx="10" fill="#f97316"/><text x="1160" y="684" text-anchor="middle" fill="white" font-family="Arial" font-size="16">ECS / EKS / EC2 Service</text>
<rect x="1330" y="650" width="210" height="58" rx="10" fill="#7c3aed"/><text x="1435" y="684" text-anchor="middle" fill="white" font-family="Arial" font-size="16">ElastiCache Node</text>
<rect x="930" y="760" width="725" height="150" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/><text x="950" y="788" font-family="Arial" font-weight="700">Isolated Data Subnet B — 10.20.21.0/24</text>
<rect x="1115" y="823" width="330" height="58" rx="10" fill="#2563eb"/><text x="1280" y="857" text-anchor="middle" fill="white" font-family="Arial" font-size="16">Aurora / RDS Standby</text>
<!-- app/data flows -->
<line x1="855" y1="360" x2="323" y2="487" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/><line x1="855" y1="360" x2="1108" y2="487" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="323" y1="544" x2="360" y2="645" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/><line x1="1108" y1="544" x2="1160" y2="645" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="360" y1="708" x2="485" y2="818" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/><line x1="1160" y1="708" x2="1280" y2="818" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="650" y1="852" x2="1110" y2="852" stroke="#2563eb" stroke-width="4" stroke-dasharray="9,7" marker-end="url(#arrow)"/>
<!-- observability -->
<rect x="85" y="1000" width="1630" height="85" rx="15" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
<text x="110" y="1028" font-family="Arial" font-size="17" font-weight="700">Security and Observability Plane</text>
<text x="110" y="1060" font-family="Arial" font-size="16">CloudTrail · Config · GuardDuty · Security Hub · VPC Flow Logs · CloudWatch Logs/Metrics · X-Ray/OpenTelemetry · KMS · Secrets Manager · AWS Backup</text>
</svg>