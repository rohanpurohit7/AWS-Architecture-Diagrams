name: Render AWS Architecture Diagrams

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'AWS-Enterprise-Architecture-Handbook/docs/diagrams/aws-diagrams/**'
      - 'AWS-Enterprise-Architecture-Handbook/scripts/render_aws_diagrams.py'
      - '.github/workflows/render-aws-diagrams.yml'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Graphviz and AWS diagram renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          python -m pip install --upgrade pip
          pip install diagrams==0.24.4

      - name: Validate every diagram import
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          import importlib
          from pathlib import Path

          root = Path('AWS-Enterprise-Architecture-Handbook/docs/diagrams/aws-diagrams')
          failures = []

          for path in sorted(root.glob('*.py')):
              tree = ast.parse(path.read_text(encoding='utf-8'), filename=str(path))
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom) and node.module:
                      try:
                          module = importlib.import_module(node.module)
                      except Exception as exc:
                          failures.append(f'{path}: cannot import module {node.module}: {exc}')
                          continue
                      for alias in node.names:
                          if alias.name == '*':
                              continue
                          if not hasattr(module, alias.name):
                              failures.append(f'{path}: {alias.name} not found in {node.module}')

          if failures:
              print('AWS diagram import validation failed:')
              for failure in failures:
                  print(f' - {failure}')
              raise SystemExit(1)

          print('All AWS diagram imports validated successfully')
          PY

      - name: Render professional AWS architecture diagrams
        run: python AWS-Enterprise-Architecture-Handbook/scripts/render_aws_diagrams.py

      - name: Validate rendered outputs
        shell: bash
        run: |
          set -euo pipefail
          ROOT="AWS-Enterprise-Architecture-Handbook"
          source_count=$(find "$ROOT/docs/diagrams/aws-diagrams" -maxdepth 1 -type f -name '*.py' | wc -l)
          png_count=$(find "$ROOT/docs/diagrams/rendered" -maxdepth 1 -type f -name '*.png' | wc -l)
          echo "Python architecture source count: $source_count"
          echo "Rendered PNG count: $png_count"
          test "$source_count" -gt 0
          test "$png_count" -eq "$source_count"
          test -f "$ROOT/docs/diagrams/README.md"

      - name: Commit rendered diagrams
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AWS-Enterprise-Architecture-Handbook/docs/diagrams/rendered AWS-Enterprise-Architecture-Handbook/docs/diagrams/README.md
          if git diff --cached --quiet; then
            echo "No rendered diagram changes to commit."
          else
            git commit -m "docs: render AWS architecture diagrams [skip ci]"
            git push
          fi
