name: Render AWS Architecture Diagrams

on:
  workflow_dispatch:
  push:
    paths:
      - 'docs/diagrams/aws-icon/**/*.puml'
      - 'scripts/render-aws-diagrams.sh'
      - '.github/workflows/render-aws-diagrams.yml'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PlantUML and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Render SVG diagrams
        run: bash scripts/render-aws-diagrams.sh

      - name: Commit rendered diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/rendered
          if git diff --cached --quiet; then
            echo "No rendered diagram changes to commit."
          else
            git commit -m "docs: render AWS architecture SVG previews [skip ci]"
            git push
          fi
