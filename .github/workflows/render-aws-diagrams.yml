name: Render AWS Architecture Diagrams

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java, Graphviz, curl, and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre-headless graphviz curl jq

      - name: Download current PlantUML release
        shell: bash
        run: |
          set -euo pipefail
          asset_url=$(curl --fail --silent --show-error --location \
            https://api.github.com/repos/plantuml/plantuml/releases/latest \
            | jq -r '.assets[] | select(.name | test("^plantuml-[0-9.]+\\.jar$")) | .browser_download_url' \
            | head -n 1)
          if [ -z "$asset_url" ] || [ "$asset_url" = "null" ]; then
            echo "Unable to resolve the latest PlantUML JAR release asset." >&2
            exit 1
          fi
          curl --fail --location --retry 3 --retry-delay 2 \
            -o "$RUNNER_TEMP/plantuml.jar" "$asset_url"
          echo "PLANTUML_JAR=$RUNNER_TEMP/plantuml.jar" >> "$GITHUB_ENV"
          java -jar "$RUNNER_TEMP/plantuml.jar" -version

      - name: Render AWS-icon PlantUML sources to SVG
        run: bash AWS-Enterprise-Architecture-Handbook/scripts/render-aws-diagrams.sh

      - name: Validate rendered outputs
        shell: bash
        run: |
          set -euo pipefail
          ROOT="AWS-Enterprise-Architecture-Handbook"
          source_count=$(find "$ROOT/docs/diagrams/aws-icon" -maxdepth 1 -type f -name '*.puml' | wc -l)
          svg_count=$(find "$ROOT/docs/diagrams/rendered" -maxdepth 1 -type f -name '*.svg' | wc -l)
          echo "PlantUML source count: $source_count"
          echo "Rendered SVG count: $svg_count"
          test "$source_count" -gt 0
          test "$svg_count" -eq "$source_count"
          test -f "$ROOT/docs/diagrams/README.md"

      - name: Commit rendered diagrams
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AWS-Enterprise-Architecture-Handbook/docs/diagrams/rendered AWS-Enterprise-Architecture-Handbook/docs/diagrams/README.md
          if git diff --cached --quiet; then
            echo "No rendered diagram changes to commit."
          else
            git commit -m "docs: render AWS architecture SVG previews [skip ci]"
            git push
          fi